# nginx site config (spec §11): serve the built SPA, proxy /api/ → api:8000.
# Loaded into /etc/nginx/conf.d/default.conf by frontend/Dockerfile.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted vite assets are immutable — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API proxy to the FastAPI container. Buffering is off so POST /api/chat
    # SSE events flush to the browser as they are produced (§9).
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
