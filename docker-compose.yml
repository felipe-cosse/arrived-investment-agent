# Two-service stack (spec §11): FastAPI api + nginx web, DuckDB on a named volume.
# `docker compose up --build` runs keyless with no .env at all — the API boots
# empty until POST /api/admin/refresh-offerings loads the catalogue (R21); copy
# backend/.env.example → backend/.env to enable chat and live enrichment (R23).

services:
  api:
    build: ./backend
    ports:
      # Personal/local research app: never publish the unauthenticated API to
      # LAN or internet interfaces. Remote deployments need an authenticated
      # reverse proxy instead of widening this binding.
      - "127.0.0.1:8000:8000"
    env_file:
      - path: backend/.env
        required: false # keyless operation needs no secrets (R21)
    volumes:
      - duckdb_data:/app/data

  web:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      api:
        condition: service_healthy # gated by the api image HEALTHCHECK (§11)

volumes:
  duckdb_data:
