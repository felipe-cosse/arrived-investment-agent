# Two-service stack (spec §11): FastAPI api + nginx web, DuckDB on a named volume.
# `docker compose up --build` works offline with no .env at all (R21); copy
# backend/.env.example → backend/.env to enable chat and live enrichment (R23).

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false # seed-only offline mode needs no secrets (R21)
    volumes:
      - duckdb_data:/app/data

  web:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy # gated by the api image HEALTHCHECK (§11)

volumes:
  duckdb_data:
